<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi, I'm Gilbert</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --color-text-primary: #111;
  --color-text-secondary: #555;
  --color-text-tertiary: #888;
  --color-border-secondary: #ccc;
  --color-border-tertiary: #eee;
  --color-background-primary: #ff85fb;
  --color-background-secondary: #f9f9f9;
  --color-background-tertiary: #f0f0f0;
  --border-radius-md: 8px;
  --font-mono: monospace;
  --range-x: 0px;
  --range-y: 30px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; height: 100vh; display: flex; overflow: hidden; }

#app {
  display: flex;
  width: 100%;
  height: 100%;
}

/* Sidebar Layout */
#sidebar {
  width: 320px;
  min-width: 320px;
  background: white;
  border-right: 1px solid var(--color-border-secondary);
  display: flex;
  flex-direction: column;
  height: 100%;
  z-index: 10;
  box-shadow: 2px 0 10px rgba(0,0,0,0.05);
}

.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--color-border-tertiary);
  text-align: center;
}

.sidebar-header h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px;
  font-weight: 600;
  color: var(--color-text-primary);
}

.sidebar-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Scrollbar */
.sidebar-content::-webkit-scrollbar { width: 6px; }
.sidebar-content::-webkit-scrollbar-track { background: transparent; }
.sidebar-content::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
.sidebar-content::-webkit-scrollbar-thumb:hover { background: #bbb; }

/* Canvas Area */
#canvas-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: var(--color-background-primary);
  transition: background-color 0.3s ease;
  position: relative;
  overflow: hidden;
}

/* Panel & Controls */
.panel { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.srow { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--color-text-secondary); }
.srow label { min-width: 90px; flex-shrink: 0; font-weight: 500;}
.srow input[type=range] { flex: 1; min-width: 0; cursor: pointer; }
.srow input[type=color] { border: none; width: 28px; height: 28px; border-radius: 4px; cursor: pointer; padding: 0; background: transparent;}
.srow input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
.srow input[type=color]::-webkit-color-swatch { border: 1px solid var(--color-border-secondary); border-radius: 4px; }
.srow .val { min-width: 40px; font-size: 11px; font-family: var(--font-mono); color: var(--color-text-tertiary); text-align: right; }

/* Collapsible Graph */
.coll { border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); overflow: hidden; background: white;}
.chead { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--color-text-secondary); user-select: none; background: var(--color-background-secondary); transition: background 0.2s;}
.chead:hover { background: var(--color-background-tertiary); }
.cbody { padding: 16px; border-top: 1px solid var(--color-border-tertiary); display: flex; flex-direction: column; align-items: center; gap: 10px; }
.ecode { font-size: 11px; font-family: var(--font-mono); color: var(--color-text-tertiary); background: var(--color-background-secondary); padding: 4px 8px; border-radius: 4px;}

/* Buttons */
.btn {
  background: #534AB7;
  color: white;
  border: none;
  padding: 12px;
  border-radius: var(--border-radius-md);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  width: 100%;
  margin-top: 8px;
}
.btn:hover:not(:disabled) { background: #403896; }
.btn:disabled { background: #a5a0d6; cursor: wait; }

/* Overlay Status */
#status-overlay {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: bold;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 100;
}

/* Cursor Glow */
#cursor-glow {
  position: absolute;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 165, 0, 1) 0%, rgba(255, 165, 0, 0) 100%);
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 50;
  opacity: 0;
  transition: opacity 0.1s;
  filter: blur(10px);
}

/* ---- BUTTERFLY ANIMATIONS ---- */
#mover-x { animation: move-x 3s ease-in-out infinite; }
#mover-y { animation: move-y 3s ease-in-out infinite; }

@keyframes move-x { 0%, 100% { transform: translateX(calc(-1 * var(--range-x))); } 50% { transform: translateX(var(--range-x)); } }
@keyframes move-y { 0%, 100% { transform: translateY(calc(-1 * var(--range-y))); } 50% { transform: translateY(var(--range-y)); } }

#bob { animation: bob 2.2s ease-in-out infinite; }
@keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

#wtl { transform-box: fill-box; transform-origin: 100% 70%; animation: flap-l .9s ease-in-out infinite; }
#wtr { transform-box: fill-box; transform-origin: 0% 70%; animation: flap-r .9s ease-in-out infinite; }
#wbl { transform-box: fill-box; transform-origin: 82% 0%; animation: flap-l .9s ease-in-out infinite .13s; }
#wbr { transform-box: fill-box; transform-origin: 15% 0%; animation: flap-r .9s ease-in-out infinite .13s; }

@keyframes flap-l { 0%, 100% { transform: rotateY(0deg); } 50% { transform: rotateY(62deg); } }
@keyframes flap-r { 0%, 100% { transform: rotateY(0deg); } 50% { transform: rotateY(-62deg); } }

#el, #er { transform-box: fill-box; transform-origin: center top; transform: scaleY(0); animation: blink 4.2s ease-in-out infinite; }
@keyframes blink { 0%, 38%, 54%, 100% { transform: scaleY(0); } 44%, 48% { transform: scaleY(1); } }

#ear-l { transform-box: fill-box; transform-origin: right bottom; animation: wiggle-l 1.5s ease-in-out infinite; }
#ear-r { transform-box: fill-box; transform-origin: left bottom; animation: wiggle-r 1.5s ease-in-out infinite; }
@keyframes wiggle-l { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(22deg); } }
@keyframes wiggle-r { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-22deg); } }
</style>
</head>

<script>
const PAD = 20, G = 120, SZ = G + PAD * 2;
let activeHandle = null; // { key, node }
let eyeTX = -0.98, eyeTY = -0.44, eyeCX = -0.98, eyeCY = -0.44; // Start centered

// Configurations for all animated groups
const animGroups = {
  moveY: { 
    label: 'Up/Down Move', ids: ['mover-y'], dur: 3.0, p1: {x: 0.42, y: 0.0}, p2: {x: 0.58, y: 1.0}, open: true,
    customHTML: `
      <div class="srow" style="margin-bottom: 8px;">
        <label>Range</label>
        <input type="range" id="range-moveY" min="0" max="300" step="5" value="30">
        <span class="val" id="range-val-moveY">30px</span>
      </div>
    `
  },
  moveX: { 
    label: 'Left/Right Move', ids: ['mover-x'], dur: 3.0, p1: {x: 0.42, y: 0.0}, p2: {x: 0.58, y: 1.0}, open: false,
    customHTML: `
      <div class="srow" style="margin-bottom: 8px;">
        <label>Range</label>
        <input type="range" id="range-moveX" min="0" max="300" step="5" value="0">
        <span class="val" id="range-val-moveX">0px</span>
      </div>
    `
  },
  upper: { label: 'Upper Wings', ids: ['wtl', 'wtr'], dur: 0.9, p1: {x: 0.42, y: 0.0}, p2: {x: 0.58, y: 1.0}, open: false },
  lower: { label: 'Lower Wings', ids: ['wbl', 'wbr'], dur: 0.9, p1: {x: 0.42, y: 0.0}, p2: {x: 0.58, y: 1.0}, open: false },
  bob:   { label: 'Body Bob',    ids: ['bob'],        dur: 2.2, p1: {x: 0.42, y: 0.0}, p2: {x: 0.58, y: 1.0}, open: false },
  ears:  { label: 'Ears',        ids: ['ear-l', 'ear-r'], dur: 1.5, p1: {x: 0.42, y: 0.0}, p2: {x: 0.58, y: 1.0}, open: false }
};

// Generate HTML for controls
const container = document.getElementById('groups-container');
Object.keys(animGroups).forEach(key => {
  const g = animGroups[key];
  container.innerHTML += `
    <div class="panel">
      <div class="srow">
        <label>${g.label}</label>
        <input type="range" id="speed-${key}" min="0.1" max="5" step="0.1" value="${g.dur}">
        <span class="val" id="speed-val-${key}">${g.dur.toFixed(2)}s</span>
      </div>
      ${g.customHTML ? `<div style="padding-top: 6px;">${g.customHTML}</div>` : ''}
      <div class="coll">
        <div class="chead" id="ease-head-${key}">
          <span>Easing Graph</span>
          <svg width="10" height="6" viewBox="0 0 10 6" id="ease-arrow-${key}" style="transition:transform .2s;transform:rotate(${g.open ? '0deg' : '-90deg'})">
            <path d="M1 1l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="cbody" id="ease-body-${key}" style="display: ${g.open ? 'flex' : 'none'}">
          <svg id="ease-svg-${key}" width="${SZ}" height="${SZ}" viewBox="0 0 ${SZ} ${SZ}" style="overflow:visible;cursor:default"></svg>
          <div class="ecode" id="ease-code-${key}"></div>
        </div>
      </div>
    </div>
  `;
});

// Initialize logic for generated elements
Object.keys(animGroups).forEach(key => {
  const g = animGroups[key];
  
  // Speed Slider
  const sl = document.getElementById(`speed-${key}`);
  const val = document.getElementById(`speed-val-${key}`);
  sl.addEventListener('input', () => {
    g.dur = parseFloat(sl.value);
    val.textContent = g.dur.toFixed(2) + 's';
    applySpeed(key);
  });
  
  // Collapse Logic
  const head = document.getElementById(`ease-head-${key}`);
  const body = document.getElementById(`ease-body-${key}`);
  const arrow = document.getElementById(`ease-arrow-${key}`);
  head.addEventListener('click', () => {
    g.open = !g.open;
    body.style.display = g.open ? 'flex' : 'none';
    arrow.style.transform = g.open ? 'rotate(0deg)' : 'rotate(-90deg)';
  });
  
  drawGraph(key);
  applySpeed(key);
});

// Set up range slider listeners
setTimeout(() => {
  const rx = document.getElementById('range-moveX');
  if(rx) rx.addEventListener('input', e => {
     document.getElementById('range-val-moveX').textContent = e.target.value + 'px';
     document.documentElement.style.setProperty('--range-x', e.target.value + 'px');
  });
  const ry = document.getElementById('range-moveY');
  if(ry) ry.addEventListener('input', e => {
     document.getElementById('range-val-moveY').textContent = e.target.value + 'px';
     document.documentElement.style.setProperty('--range-y', e.target.value + 'px');
  });
}, 0);

// Drawing and applying functions
function gp(nx, ny) { return [PAD + nx * G, PAD + (1 - ny) * G]; }

function drawGraph(key) {
  const svg = document.getElementById(`ease-svg-${key}`);
  if (!svg) return;
  const g = animGroups[key];
  const [ax, ay] = gp(0, 0), [bx, by] = gp(g.p1.x, g.p1.y), [cx, cy] = gp(g.p2.x, g.p2.y), [dx, dy] = gp(1, 1);
  
  let s = '';
  for(let i=0; i<=4; i++) {
    const gx = PAD + (i/4)*G, gy = PAD + (i/4)*G;
    s += `<line x1="${gx}" y1="${PAD}" x2="${gx}" y2="${PAD+G}" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>`;
    s += `<line x1="${PAD}" y1="${gy}" x2="${PAD+G}" y2="${gy}" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>`;
  }
  s += `<line x1="${ax}" y1="${ay}" x2="${dx}" y2="${dy}" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="3 2"/>`;
  s += `<line x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}" stroke="#AFA9EC" stroke-width="1" stroke-dasharray="2 2"/>`;
  s += `<line x1="${dx}" y1="${dy}" x2="${cx}" y2="${cy}" stroke="#ED93B1" stroke-width="1" stroke-dasharray="2 2"/>`;
  s += `<path d="M ${ax} ${ay} C ${bx} ${by} ${cx} ${cy} ${dx} ${dy}" fill="none" stroke="#534AB7" stroke-width="2" stroke-linecap="round"/>`;
  s += `<circle cx="${ax}" cy="${ay}" r="3" fill="var(--color-text-secondary)" pointer-events="none"/>`;
  s += `<circle cx="${dx}" cy="${dy}" r="3" fill="var(--color-text-secondary)" pointer-events="none"/>`;
  s += `<circle data-key="${key}" data-node="h1" cx="${bx}" cy="${by}" r="6" fill="#BD8FFF" stroke="#534AB7" stroke-width="1" style="cursor:grab" class="handle"/>`;
  s += `<circle data-key="${key}" data-node="h2" cx="${cx}" cy="${cy}" r="6" fill="#FF59B8" stroke="#993556" stroke-width="1" style="cursor:grab" class="handle"/>`;
  
  svg.innerHTML = s;
  
  svg.querySelectorAll('.handle').forEach(el => {
    el.addEventListener('mousedown', e => {
      activeHandle = { key: el.dataset.key, node: el.dataset.node };
      e.preventDefault(); e.stopPropagation();
    });
  });
  
  const code = `cubic-bezier(${g.p1.x.toFixed(2)}, ${g.p1.y.toFixed(2)}, ${g.p2.x.toFixed(2)}, ${g.p2.y.toFixed(2)})`;
  document.getElementById(`ease-code-${key}`).textContent = code;
  applyEase(key);
}

function applyEase(key) {
  const g = animGroups[key];
  const e = `cubic-bezier(${g.p1.x.toFixed(3)},${g.p1.y.toFixed(3)},${g.p2.x.toFixed(3)},${g.p2.y.toFixed(3)})`;
  g.ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.animationTimingFunction = e;
  });
}

function applySpeed(key) {
  const g = animGroups[key];
  g.ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.animationDuration = g.dur + 's';
  });
}

// Cursor Glow Logic
const canvasContainer = document.getElementById('canvas-container');
const cursorGlow = document.getElementById('cursor-glow');

canvasContainer.addEventListener('mousemove', e => {
  cursorGlow.style.opacity = 1;
  const rect = canvasContainer.getBoundingClientRect();
  cursorGlow.style.left = (e.clientX - rect.left) + 'px';
  cursorGlow.style.top = (e.clientY - rect.top) + 'px';
});

canvasContainer.addEventListener('mouseleave', () => {
  cursorGlow.style.opacity = 0;
});

// Global Mouse Events
document.addEventListener('mousemove', e => {
  if (activeHandle) {
    const { key, node } = activeHandle;
    const svg = document.getElementById(`ease-svg-${key}`);
    const r = svg.getBoundingClientRect();
    const sx = (e.clientX - r.left) * (SZ / r.width);
    const sy = (e.clientY - r.top) * (SZ / r.height);
    const nx = Math.max(0, Math.min(1, (sx - PAD) / G));
    const ny = Math.max(-0.5, Math.min(1.5, 1 - (sy - PAD) / G));
    
    if (node === 'h1') {
      animGroups[key].p1.x = +nx.toFixed(3); animGroups[key].p1.y = +ny.toFixed(3);
    } else {
      animGroups[key].p2.x = +nx.toFixed(3); animGroups[key].p2.y = +ny.toFixed(3);
    }
    drawGraph(key);
    return;
  }
  
  // Eyes following mouse
  const bobGroup = document.getElementById('bob');
  if(!bobGroup) return;
  const sr = bobGroup.getBoundingClientRect(); // Grabs LIVE location due to wrappers
  const ecx = sr.left + ((44.4 + 10) / 109) * sr.width;
  const ecy = sr.top + ((21.7 + 20) / 92) * sr.height;
  const dx = e.clientX - ecx, dy = e.clientY - ecy;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  const maxR = sr.width * 0.4;
  const f = Math.min(dist, maxR) / maxR;
  
  const baseOffsetX = -0.98;
  const baseOffsetY = -0.44;
  const maxMoveX = 1.0;
  const maxMoveY = 0.8;
  
  const moveX = (dx / dist) * f * maxMoveX;
  const moveY = (dy / dist) * f * maxMoveY;
  
  eyeTX = baseOffsetX + moveX;
  eyeTY = baseOffsetY + moveY;
});

document.addEventListener('mouseup', () => { activeHandle = null; });

(function animEyes() {
  eyeCX += (eyeTX - eyeCX) * 0.05;
  eyeCY += (eyeTY - eyeCY) * 0.05;
  const pl = document.getElementById('pl'), pr = document.getElementById('pr');
  if(pl) pl.style.transform = `translate(${eyeCX.toFixed(3)}px,${eyeCY.toFixed(3)}px)`;
  if(pr) pr.style.transform = `translate(${eyeCX.toFixed(3)}px,${eyeCY.toFixed(3)}px)`;
  requestAnimationFrame(animEyes);
})();

// Other Basic Controls
const blinkSl = document.getElementById('blink-sl');
blinkSl.addEventListener('input', () => {
  const v = parseFloat(blinkSl.value);
  document.getElementById('blink-val').textContent = v.toFixed(2) + 's';
  document.getElementById('el').style.animationDuration = v + 's';
  document.getElementById('er').style.animationDuration = v + 's';
});

const bgColorInput = document.getElementById('bg-color');
bgColorInput.addEventListener('input', (e) => {
  document.getElementById('canvas-container').style.backgroundColor = e.target.value;
});

// WEBM EXPORT LOGIC
const exportBtn = document.getElementById('export-btn');
exportBtn.addEventListener('click', () => {
  exportBtn.disabled = true;
  const overlay = document.getElementById('status-overlay');
  overlay.style.opacity = 1;
  
  const canvas = document.createElement('canvas');
  // Size export canvas to exactly match the live layout preview container
  const contRectLive = document.getElementById('canvas-container').getBoundingClientRect();
  canvas.width = contRectLive.width; 
  canvas.height = contRectLive.height;
  const ctx = canvas.getContext('2d');
  
  const stream = canvas.captureStream(30);
  const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
  const chunks = [];
  
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'butterfly_animation.webm';
    a.click();
    exportBtn.disabled = false;
    overlay.style.opacity = 0;
  };

  const clone = document.getElementById('mainsvg').cloneNode(true);
  const styleEl = document.createElement('style');
  styleEl.textContent = document.querySelector('style').textContent;
  clone.prepend(styleEl);
  
  const allIds = [];
  Object.values(animGroups).forEach(g => allIds.push(...g.ids));
  allIds.push('el', 'er'); // eyes
  
  const cloneEls = allIds.map(id => clone.querySelector('#' + id)).filter(Boolean);
  const bgColor = bgColorInput.value;
  
  let startTime = performance.now();
  let rafId;
  const RECORD_DURATION = 4000; // Capture 4 seconds
  
  recorder.start();
  
  function drawFrame() {
    let now = performance.now();
    let elapsed = now - startTime;
    
    if (elapsed > RECORD_DURATION) {
      recorder.stop();
      return;
    }
    
    let tSec = elapsed / 1000;
    cloneEls.forEach(el => {
      el.style.animationPlayState = 'paused';
      el.style.animationDelay = `-${tSec}s`;
    });
    
    // JS transform for pupils
    const pl = clone.querySelector('#pl'), pr = clone.querySelector('#pr');
    if(pl) pl.style.transform = `translate(${eyeCX.toFixed(3)}px, ${eyeCY.toFixed(3)}px)`;
    if(pr) pr.style.transform = `translate(${eyeCX.toFixed(3)}px, ${eyeCY.toFixed(3)}px)`;
    
    const svgStr = new XMLSerializer().serializeToString(clone);
    const img = new Image();
    img.onload = () => {
      // Draw background
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Calculate drawing offsets from the wrappers that are animated via CSS
      const liveMoverX = document.getElementById('mover-x');
      const liveMoverY = document.getElementById('mover-y');
      
      // Compute the LIVE position of the static SVG wrapper relative to container
      const liveMoverRect = liveMoverY.getBoundingClientRect();
      const currentContRect = document.getElementById('canvas-container').getBoundingClientRect();
      
      const drawX = liveMoverRect.left - currentContRect.left;
      const drawY = liveMoverRect.top - currentContRect.top;
      
      // Draw character exactly where it is moving in the view
      ctx.drawImage(img, drawX, drawY, liveMoverRect.width, liveMoverRect.height);
      rafId = requestAnimationFrame(drawFrame);
    };
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
  }
  
  requestAnimationFrame(drawFrame);
});
</script>
</body>
</html>
